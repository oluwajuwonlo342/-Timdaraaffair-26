no<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#TIMDARAAFFAIRS'26</title>
    <link rel="icon" type="image/jpg" href="1001538218.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9f9f9; color: #1a1a1a; overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .btn-disabled {
            background-color: #e5e7eb !important;
            color: #9ca3af !important;
            cursor: not-allowed !important;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased">

    <nav class="flex justify-center items-center px-8 py-8 uppercase text-[10px] tracking-[0.2em]">
        <div class="text-xl font-serif tracking-widest font-light">#TIMDARAAFFAIRS'26</div>
    </nav>

    <section class="max-w-6xl mx-auto px-2 py-8 text-center">
        <div class="flex flex-row justify-center items-center gap-1 md:gap-8 mb-12">
            <div class="w-16 h-24 sm:w-24 sm:h-36 md:w-32 md:h-48 bg-gray-200 overflow-hidden shrink-0 shadow-sm border border-white">
                <img src="1001538218.jpg" alt="Side 1" class="w-full h-full object-cover grayscale">
            </div>
            <div class="flex flex-col justify-center px-1 sm:px-4">
                <div class="text-2xl sm:text-5xl md:text-8xl font-serif font-light tracking-tighter whitespace-nowrap">
                    09 <span class="text-lg md:text-6xl mx-0.5">•</span> 05 <span class="text-lg md:text-6xl mx-0.5">•</span> 2026
                </div>
            </div>
            <div class="w-16 h-24 sm:w-24 sm:h-36 md:w-32 md:h-48 bg-gray-200 overflow-hidden shrink-0 shadow-sm border border-white">
                <img src="1001538216.jpg" alt="Side 2" class="w-full h-full object-cover grayscale">
            </div>
        </div>
        
        <div class="max-w-md mx-auto mb-10">
            <div class="px-4">
                <img src="1001538223.jpg" alt="Main Couple" class="w-full h-auto grayscale mb-8 shadow-xl border-4 border-white">
            </div>
            <p class="uppercase text-[9px] sm:text-[10px] tracking-[0.3em] leading-relaxed px-6 mb-12 opacity-70">
                Join us as we embark on a journey of love, joy, and eternal happiness.
            </p>

            <div class="flex flex-col items-center gap-4 mt-8 px-6">
                <button id="downloadBtn" onclick="startDownload()" 
                   class="w-full sm:w-auto inline-flex items-center justify-center px-10 py-4 font-bold tracking-[0.2em] text-white bg-black hover:bg-neutral-800 transition-all uppercase text-[11px] shadow-lg active:scale-95">
                    <svg id="dlIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12 a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    <span id="btnText">Download Invitation</span>
                </button>
                <p id="statusMsg" class="text-[9px] text-gray-400 italic">Saved directly to your device</p>
            </div>
        </div>
    </section>

    <script>
        // Filename setup
        const IMAGE_TO_DOWNLOAD = 'Timdaraaffairs'26.jpg'; 
        const SAVE_AS_NAME = 'TimDara_Invitation.jpg';

        // Check if user already downloaded on page load
        window.onload = function() {
            if (localStorage.getItem('invitation_saved') === 'true') {
                applyDownloadedStyle();
            }
        };

        async function startDownload() {
            const btn = document.getElementById('downloadBtn');
            const text = document.getElementById('btnText');
            
            text.innerText = "Processing...";

            try {
                // Force the browser to treat the image as a file (Blob)
                const response = await fetch(IMAGE_TO_DOWNLOAD);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
                link.download = SAVE_AS_NAME;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                window.URL.revokeObjectURL(url);

                // Mark as downloaded
                localStorage.setItem('invitation_saved', 'true');
                applyDownloadedStyle();

            } catch (error) {
                // Fallback if Fetch is blocked (common on local 'file:///' paths)
                const link = document.createElement('a');
                link.href = IMAGE_TO_DOWNLOAD;
                link.download = SAVE_AS_NAME;
                link.click();
                
                localStorage.setItem('invitation_saved', 'true');
                applyDownloadedStyle();
            }
        }

        function applyDownloadedStyle() {
            const btn = document.getElementById('downloadBtn');
            const text = document.getElementById('btnText');
            const icon = document.getElementById('dlIcon');
            const msg = document.getElementById('statusMsg');

            btn.classList.add('btn-disabled');
            btn.onclick = null;
            text.innerText = "Invitation Saved";
            icon.style.display = "none";
            msg.innerText = "You have already saved your invitation.";
            msg.classList.add('text-green-600');
        }
    </script>

</body>
</html>
